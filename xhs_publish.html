<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>发布助手</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

        :root {
            --red: #FF2442;
            --red-light: #FF6B81;
            --red-dim: rgba(255,36,66,0.10);
            --bg: #F7F7F8;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --muted: #999;
            --border: #EFEFEF;
            --success: #07C160;
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans SC', -apple-system, "PingFang SC", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        /* ── 顶部色块 ── */
        .top-bar {
            background: var(--red);
            padding: 20px 20px 48px;
            position: relative;
            overflow: hidden;
        }
        .top-bar::after {
            content: '';
            position: absolute;
            bottom: -24px; left: 0; right: 0;
            height: 48px;
            background: var(--bg);
            border-radius: 24px 24px 0 0;
        }
        .top-bar-inner {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-bar-title {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .top-bar-sub {
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            margin-top: 2px;
        }
        .xhs-icon {
            width: 36px; height: 36px;
            background: #fff;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        /* ── 主体 ── */
        .main {
            padding: 0 16px 32px;
            margin-top: -8px;
            position: relative;
            z-index: 1;
        }

        /* ── 加载 / 错误 ── */
        .state-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 48px 24px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-label { font-size: 14px; color: var(--muted); }

        /* ── 卡片 ── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .card-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .card-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .card-title-text {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }

        /* ── 图片区 ── */
        .img-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .img-badge {
            background: var(--red-dim);
            color: var(--red);
            font-size: 13px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .img-hint {
            font-size: 12px;
            color: var(--muted);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .gallery-item {
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--border);
            aspect-ratio: 1;
        }
        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-num {
            position: absolute;
            top: 5px; left: 5px;
            background: var(--red);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* iOS长按提示覆盖层 */
        .ios-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.55);
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            flex-direction: column;
            gap: 4px;
        }
        .ios-overlay span { color: #fff; font-size: 11px; font-weight: 700; }
        .ios-overlay .ico { font-size: 20px; }
        body.is-ios .gallery-item .ios-overlay { display: flex; }

        /* ── 进度条 ── */
        .progress-wrap {
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: var(--red);
            width: 0%;
            transition: width .3s;
            border-radius: 4px;
        }

        /* ── 按钮 ── */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity .15s, transform .1s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        .btn:active { opacity: .85; transform: scale(0.985); }
        .btn + .btn { margin-top: 10px; }

        .btn-red {
            background: var(--red);
            color: #fff;
        }
        .btn-outline {
            background: #fff;
            color: var(--red);
            border: 2px solid var(--red);
        }
        .btn-green {
            background: var(--success);
            color: #fff;
            pointer-events: none;
        }
        .btn-gray {
            background: var(--border);
            color: var(--muted);
            pointer-events: none;
        }

        /* ── 动作区底部卡片 ── */
        .action-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        /* ── 步骤提示 ── */
        .steps {
            margin-top: 14px;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }
        .steps-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .step-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 9px;
        }
        .step-num {
            width: 20px; height: 20px;
            background: var(--red-dim);
            color: var(--red);
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .step-text {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
        .step-text strong { color: var(--text); }

        /* ── toast ── */
        .toast {
            position: fixed;
            bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.78);
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s, transform .25s;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── 成功态 ── */
        .save-ok {
            display: none;
            align-items: center;
            gap: 8px;
            color: var(--success);
            font-size: 13px;
            font-weight: 700;
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(7,193,96,0.1);
            border-radius: var(--radius-sm);
        }
        .save-ok.show { display: flex; }
    </style>
</head>
<body>

    <!-- 顶部 -->
    <div class="top-bar">
        <div class="top-bar-inner">
            <div class="xhs-icon">📕</div>
            <div>
                <div class="top-bar-title">小红书发布助手</div>
                <div class="top-bar-sub">按步骤操作，省时不出错</div>
            </div>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main">

        <!-- 加载态 -->
        <div id="stateLoading" class="state-box">
            <div class="spinner"></div>
            <div class="state-label">正在加载...</div>
        </div>

        <!-- 错误态 -->
        <div id="stateError" class="state-box" style="display:none;">
            <div style="font-size:36px;margin-bottom:12px;">😕</div>
            <div style="font-size:15px;font-weight:700;margin-bottom:6px;">内容加载失败</div>
            <div class="state-label" id="errorMsg">请检查二维码是否正确</div>
        </div>

        <!-- 正文内容 -->
        <div id="mainContent" style="display:none;">

            <!-- 标题卡 -->
            <div class="card">
                <div class="card-label">标题</div>
                <div class="card-title-text" id="titleText">-</div>
            </div>

            <!-- 正文卡 -->
            <div class="card">
                <div class="card-label">正文</div>
                <div class="card-text" id="bodyText">-</div>
            </div>

            <!-- 图片卡 -->
            <div class="card" id="imgCard" style="display:none;">
                <div class="card-label">图片素材</div>
                <div class="img-meta">
                    <div class="img-badge">共 <span id="imgCount">0</span> 张</div>
                    <div class="img-hint" id="imgHint">按序号①②③选择</div>
                </div>
                <div class="gallery" id="gallery"></div>
                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <!-- Android保存按钮 -->
                <button class="btn btn-red" id="saveBtn">
                    <span>📥</span><span>一键保存全部图片</span>
                </button>
                <!-- iOS提示（无按钮，长按保存） -->
                <div id="iosSaveHint" style="display:none;background:rgba(255,36,66,0.07);border-radius:10px;padding:12px 14px;font-size:13px;color:#c00;line-height:1.6;">
                    📌 <strong>iOS用户</strong>：长按上方每张图片 → 选择「存储图片」，按 ①②③ 顺序保存
                </div>
                <div class="save-ok" id="saveOk">✅ 图片已全部保存，请按顺序选取</div>
            </div>

            <!-- 操作区 -->
            <div class="action-card">
                <button class="btn btn-outline" id="copyBtn">
                    <span>📋</span><span>复制标题 + 正文</span>
                </button>
                <button class="btn btn-red" id="xhsBtn">
                    <span>🚀</span><span>打开小红书去发布</span>
                </button>

                <!-- 操作步骤 -->
                <div class="steps">
                    <div class="steps-title">发布步骤</div>
                    <div class="step-row" id="stepSave" style="display:none;">
                        <div class="step-num">1</div>
                        <div class="step-text"><strong>保存图片</strong> — 点击上方按钮，图片自动排好序</div>
                    </div>
                    <div class="step-row" id="stepCopy">
                        <div class="step-num" id="stepCopyNum">1</div>
                        <div class="step-text"><strong>复制文案</strong> — 标题+正文一次复制</div>
                    </div>
                    <div class="step-row">
                        <div class="step-num" id="stepXhsNum">2</div>
                        <div class="step-text"><strong>打开小红书</strong> → 点「+」→ 图文 → 长按粘贴文案</div>
                    </div>
                    <div class="step-row" id="stepPickImg" style="display:none;">
                        <div class="step-num" id="stepPickNum">3</div>
                        <div class="step-text">相册选图 — 选最新的 <strong id="imgCountTip">N</strong> 张，按 ①②③ 顺序</div>
                    </div>
                    <div class="step-row">
                        <div class="step-num" id="stepPublishNum">3</div>
                        <div class="step-text"><strong>发布</strong> 🎉</div>
                    </div>
                </div>
            </div>

        </div><!-- /mainContent -->
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    (function () {
        // ── 工具 ──────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (isIOS) document.body.classList.add('is-ios');

        function showToast(msg, duration = 2000) {
            const t = $('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        // ── URL 参数解析（兼容多种格式）─────────────────────
        function getParams() {
            const p = new URLSearchParams(window.location.search);
            // 支持 title/标题、content/正文/body、images/图片
            return {
                id:      p.get('id') || p.get('record_id') || '',
                title:   p.get('title') || p.get('标题') || '',
                content: p.get('content') || p.get('body') || p.get('正文') || p.get('文案') || '',
                images:  parseImages(p.get('images') || p.get('image') || p.get('图片') || p.get('imgs') || '')
            };
        }

        function parseImages(raw) {
            if (!raw) return [];
            return raw.split(/[,\n]/).map(s => s.trim()).filter(s => s.startsWith('http'));
        }

        // ── 初始化 ────────────────────────────────────────────
        function init() {
            const data = getParams();

            if (!data.title && !data.content) {
                $('stateLoading').style.display = 'none';
                $('stateError').style.display = 'block';
                return;
            }

            // 填充内容
            $('titleText').textContent = data.title || '（无标题）';
            $('bodyText').textContent  = data.content || '（无正文）';

            // 图片
            const imgs = data.images;
            if (imgs.length > 0) {
                $('imgCard').style.display = 'block';
                $('imgCount').textContent = imgs.length;
                $('imgCountTip').textContent = imgs.length;

                // 步骤编号动态调整（有图时多一步）
                $('stepSave').style.display   = isIOS ? 'none' : 'flex';
                $('stepPickImg').style.display = 'flex';
                if (!isIOS) {
                    $('stepCopyNum').textContent   = '2';
                    $('stepXhsNum').textContent    = '3';
                    $('stepPickNum').textContent   = '4';
                    $('stepPublishNum').textContent = '5';
                } else {
                    $('imgHint').textContent = '长按每张图片 → 存储图片';
                    $('iosSaveHint').style.display = 'block';
                    $('saveBtn').style.display = 'none';
                    $('stepCopyNum').textContent   = '2';
                    $('stepXhsNum').textContent    = '3';
                    $('stepPickNum').textContent   = '4';
                    $('stepPublishNum').textContent = '5';
                }

                buildGallery(imgs);
            }

            // 显示
            $('stateLoading').style.display = 'none';
            $('mainContent').style.display  = 'block';

            bindEvents(data);
        }

        // ── 构建图片库 ────────────────────────────────────────
        function buildGallery(imgs) {
            const g = $('gallery');
            imgs.forEach((url, i) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${url}" alt="图${i+1}"
                         onerror="this.style.opacity='.3';this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'">
                    <div class="gallery-num">${i + 1}</div>
                    <div class="ios-overlay">
                        <span class="ico">👆</span>
                        <span>长按存储</span>
                    </div>`;
                g.appendChild(div);
            });
        }

        // ── 事件绑定 ──────────────────────────────────────────
        function bindEvents(data) {
            // 保存图片（Android）
            const saveBtn = $('saveBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', () => saveAllImages(data.images));
            }

            // 复制
            $('copyBtn').addEventListener('click', () => copyContent(data.title, data.content));

            // 打开小红书
            $('xhsBtn').addEventListener('click', openXHS);
        }

        // ── 保存图片（Android / 非iOS）────────────────────────
        async function saveAllImages(imgs) {
            const btn   = $('saveBtn');
            const wrap  = $('progressWrap');
            const fill  = $('progressFill');
            const ok    = $('saveOk');

            btn.className = 'btn btn-gray';
            btn.innerHTML = '<span>⏳</span><span>正在保存...</span>';
            wrap.style.display = 'block';

            const base = Date.now();
            let failed = 0;

            for (let i = 0; i < imgs.length; i++) {
                try {
                    await downloadOne(imgs[i], `XHS_${base + i * 1000}_${String(i+1).padStart(2,'0')}.jpg`);
                } catch (e) {
                    failed++;
                }
                fill.style.width = ((i + 1) / imgs.length * 100) + '%';
                await sleep(120);
            }

            wrap.style.display = 'none';

            if (failed === 0) {
                btn.className = 'btn btn-green';
                btn.innerHTML = '<span>✅</span><span>全部保存成功</span>';
                ok.classList.add('show');
                showToast('✅ 图片已保存到相册');
            } else {
                btn.className = 'btn btn-red';
                btn.innerHTML = `<span>⚠️</span><span>有 ${failed} 张失败，重试</span>`;
                btn.disabled = false;
                showToast(`⚠️ ${failed} 张图片保存失败，请重试`);
            }
        }

        function downloadOne(url, filename) {
            return new Promise((res, rej) => {
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); res(); }, 80);
            });
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ── 复制文案 ──────────────────────────────────────────
        async function copyContent(title, content) {
            // 标题和正文之间加两个换行，方便粘贴后识别
            const text = [title, content].filter(Boolean).join('\n\n');

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    fallbackCopy(text);
                }
                const btn = $('copyBtn');
                btn.className = 'btn btn-green';
                btn.innerHTML = '<span>✅</span><span>复制成功</span>';
                showToast('✅ 文案已复制');
                setTimeout(() => {
                    btn.className = 'btn btn-outline';
                    btn.innerHTML = '<span>📋</span><span>复制标题 + 正文</span>';
                }, 2500);
            } catch (e) {
                showToast('❌ 复制失败，请手动长按复制');
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }

        // ── 打开小红书 ────────────────────────────────────────
        // 尝试多个 scheme，降级到应用商店
        function openXHS() {
            const schemes = [
                'xhsdiscover://publish',   // 部分版本直跳发布页
                'xhsdiscover://',          // 打开首页
            ];

            let tried = false;

            // 监听页面是否被隐藏（说明跳转成功）
            const onHide = () => {
                tried = true;
                document.removeEventListener('visibilitychange', onHide);
            };
            document.addEventListener('visibilitychange', onHide);

            // 尝试第一个 scheme
            window.location.href = schemes[0];

            setTimeout(() => {
                document.removeEventListener('visibilitychange', onHide);
                if (!tried) {
                    // 跳转失败，引导用户手动打开
                    showToast('请手动打开小红书 APP', 3000);
                }
            }, 1500);
        }

        // ── 启动 ──────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
